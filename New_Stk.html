<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadila Stockist Request Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    :root{--navy:#0f2d52;--blue:#1a4a7a;--mid:#2563a8;--accent:#3b82f6;--light:#e8f0fe;--green:#16a34a;--red:#dc2626;--grey:#f8f9fc;--border:#dde3ed;--text:#1e293b;--muted:#64748b;--white:#fff}
    *{box-sizing:border-box;margin:0;padding:0} body{font-family:'DM Sans',sans-serif;background:#f0f4f8;color:var(--text);min-height:100vh}
    button,input,select,textarea{font:inherit} button{cursor:pointer;border:none} input,select,textarea{outline:none}
    .header{background:var(--navy);padding:18px 28px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,.16)}
    .header-left{display:flex;align-items:center;gap:12px}.header-logo{width:38px;height:38px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px}
    .header-title{color:#fff;font-size:17px;font-weight:700}.header-sub{color:#9fc0df;font-size:12px}
    .btn-admin-nav{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.16);padding:9px 14px;border-radius:8px;font-size:13px;font-weight:700}
    .btn-exit{background:rgba(220,38,38,.92)}
    .progress-wrap{background:#fff;border-bottom:1px solid var(--border);padding:0 28px;overflow:auto}.progress-steps{display:flex;list-style:none;min-width:max-content}.progress-steps li{display:flex;align-items:center;gap:8px;padding:14px 18px;font-size:12px;font-weight:500;color:var(--muted);border-bottom:3px solid transparent;white-space:nowrap}.progress-steps li.active{color:var(--blue);border-bottom-color:var(--blue)}.progress-steps li.done{color:var(--green);border-bottom-color:var(--green)}
    .step-num{width:22px;height:22px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}.active .step-num{background:var(--blue);color:#fff}.done .step-num{background:var(--green);color:#fff}
    .container{max-width:760px;margin:28px auto;padding:0 16px 60px}.section-panel{display:none}.section-panel.active{display:block;animation:fade .22s ease}@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .section-header{margin-bottom:20px}.section-header h2{font-family:'DM Serif Display',serif;font-size:28px;color:var(--navy)}.section-header p{color:var(--muted);font-size:13px;margin-top:5px}
    .card{background:#fff;border-radius:14px;padding:26px;border:1px solid var(--border);box-shadow:0 2px 10px rgba(15,45,82,.05)}
    .field{margin-bottom:18px} label{display:block;font-size:13px;font-weight:700;color:var(--text);margin-bottom:7px}.req{color:var(--red)}
    input[type=text],input[type=email],input[type=password],select,textarea{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:9px;background:#fff;font-size:14px} input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.12)} textarea{resize:vertical;min-height:88px}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.radio-group{display:flex;gap:10px;flex-wrap:wrap}.radio-opt{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1.5px solid var(--border);border-radius:9px;background:#fff;cursor:pointer;font-size:14px}.radio-opt.selected{border-color:var(--blue);background:var(--light);font-weight:600}
    .file-upload-area{border:2px dashed var(--border);border-radius:10px;padding:16px;text-align:center;background:var(--grey)}.file-upload-area.has-file{border-color:var(--green);background:#f0fdf4}.upload-icon{font-size:24px;margin-bottom:6px}.upload-label{font-size:13px;color:var(--muted)}.file-name{margin-top:8px;font-size:12px;color:var(--green);font-weight:700}
    .info-box{background:var(--light);border:1px solid #cfe0ff;border-radius:9px;padding:12px 14px;color:var(--blue);font-size:13px;margin-bottom:16px}.nav-bar{display:flex;justify-content:space-between;gap:12px;margin-top:22px}.btn{display:inline-flex;align-items:center;justify-content:center;padding:11px 22px;border-radius:9px;font-size:14px;font-weight:700}.btn-primary{background:var(--blue);color:#fff}.btn-secondary{background:#fff;color:var(--blue);border:1.5px solid var(--border)}.btn-submit{background:var(--green);color:#fff}
    .mini-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}.table-wrap{overflow:auto;background:#fff;border:1px solid var(--border);border-radius:12px}.table{width:100%;border-collapse:collapse}.table th,.table td{padding:12px 14px;border-bottom:1px solid #edf1f6;text-align:left;font-size:13px}.table th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}.badge{display:inline-flex;padding:4px 9px;border-radius:999px;font-size:11px;font-weight:700}.submitted{background:#dbeafe;color:#1d4ed8}.pending{background:#ffedd5;color:#c2410c}.completed{background:#dcfce7;color:#15803d}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);align-items:center;justify-content:center;padding:18px}.modal-overlay.active{display:flex}.modal-box{background:#fff;padding:22px;border-radius:14px;width:340px;box-shadow:0 4px 28px rgba(0,0,0,.2)}.modal-box h3{font-family:'DM Serif Display',serif;color:var(--navy);margin-bottom:12px}
    .hidden{display:none!important}
    @media (max-width:720px){.grid-2{grid-template-columns:1fr}.header{padding:14px 16px}.progress-wrap{padding:0 12px}.container{margin:18px auto;padding:0 12px 40px}.card{padding:18px}.nav-bar{flex-direction:column-reverse}.btn{width:100%}}
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="header-logo">💊</div>
      <div>
        <div class="header-title">Stockist Request Portal</div>
        <div class="header-sub">Cadila Pharma</div>
      </div>
    </div>
    <div>
      <button class="btn-admin-nav" id="btn-admin-login" onclick="openAdmin()">Admin Login</button>
      <button class="btn-admin-nav btn-exit hidden" id="btn-back-form" onclick="closeAdmin()">← Back to Form</button>
    </div>
  </div>

  <div id="main-app">
    <div class="progress-wrap">
      <ul class="progress-steps" id="progress-steps"></ul>
    </div>
    <div class="container">
      <div id="steps-holder"></div>
      <div id="success-panel" class="card hidden" style="text-align:center">
        <div style="font-size:42px;margin-bottom:10px">✅</div>
        <h2 style="font-family:'DM Serif Display',serif;color:var(--navy)">Submitted Successfully</h2>
        <p style="color:var(--muted);margin-top:8px">Request ID: <strong id="req-id-display"></strong></p>
      </div>
    </div>
  </div>

  <div id="admin-app" class="hidden">
    <div class="container">
      <div class="section-header"><h2>Admin Panel</h2><p>Resubmission</p></div>
      <div class="card">
        <div class="field"><label>Select Request</label><select id="admin-req-select"></select></div>
        <div class="field"><label>Admin Email</label><input type="email" id="admin-email" value="nihar.mashru@cadilapharma.com"></div>
        <div class="field"><label>Documents Needed</label><div class="grid-2" id="admin-doc-list"></div></div>
        <div class="field"><label>Remarks</label><textarea id="admin-remarks"></textarea></div>
        <button class="btn btn-submit" onclick="sendResubmission()">Send Resubmission Email</button>
      </div>
    </div>
  </div>

  <div id="resubmit-app" class="hidden">
    <div class="container">
      <div class="section-header"><h2>Document Resubmission</h2><p>Please upload requested documents.</p></div>
      <div class="card">
        <div class="field"><label>Select Token</label><select id="resubmit-token" onchange="loadResubmission()"></select></div>
        <div class="info-box"><strong>Admin Remarks:</strong> <span id="resubmit-remarks">-</span></div>
        <div id="resubmit-fields"></div>
        <div class="nav-bar"><div></div><button class="btn btn-submit" onclick="submitResubmission()">Upload & Resubmit</button></div>
      </div>
    </div>
  </div>

  <div id="records-app" class="hidden">
    <div class="container">
      <div class="section-header"><h2>Records</h2></div>
      <div class="mini-card"><strong>Requests</strong></div>
      <div class="table-wrap" style="margin-bottom:16px"><table class="table" id="requests-table"></table></div>
      <div class="mini-card"><strong>Document History</strong></div>
      <div class="table-wrap" style="margin-bottom:16px"><table class="table" id="docs-table"></table></div>
      <div class="mini-card"><strong>Resubmissions</strong></div>
      <div class="table-wrap"><table class="table" id="resub-table"></table></div>
    </div>
  </div>

  <div class="modal-overlay" id="admin-modal">
    <div class="modal-box">
      <h3>Admin Login</h3>
      <div class="field"><label>Password</label><input type="password" id="admin-pwd"></div>
      <div class="nav-bar"><button class="btn btn-secondary" onclick="closeAdminModal()">Cancel</button><button class="btn btn-primary" onclick="validateAdmin()">Unlock</button></div>
    </div>
  </div>

<script>
const DOC_LIST=['Drug License','GSTIN','PAN Card','Food Licence','Aadhar Card','Stockist Profile','Party Request Letter','Bank Statement','TDS Declaration','Pharma Rack Consent','Warehouse Photos','HQ Statement 1'];
const stepNames=['Applicant','Stockist Info','KYC Docs','Financial Docs','HQ Statements','Details','Submit'];
let currentStep=0;
let form={email:'field@cadila.demo',name:'Nihar Demo',division:'New Care - DG',codeType:'New Stockiest Code',stockistName:'Shreeji Pharma',stockistPlace:'Ahmedabad',hq:'Ahmedabad HQ',pharmaRack:'Yes',remarks:'',replacementInfo:'',replacementReason:'',limitReduction:'MIS can select'};
let db={requests:[{id:'REQ-240731-ABC',name:'Shreeji Pharma',division:'New Care - DG',status:'Submitted',email:'field@cadila.demo'}],docs:[{req:'REQ-240731-ABC',doc:'Drug License',type:'Original',file:'drug-license.pdf'},{req:'REQ-240731-ABC',doc:'GSTIN',type:'Original',file:'gstin.pdf'},{req:'REQ-240731-ABC',doc:'Food Licence',type:'Original',file:'food-licence.pdf'},{req:'REQ-240731-ABC',doc:'HQ Statement 1',type:'Original',file:'hq1.xlsx'}],resub:[]};
let selectedDocs={};let resubUploads={};
function renderProgress(){document.getElementById('progress-steps').innerHTML=stepNames.map((s,i)=>`<li class="${i===currentStep?'active':''} ${i<currentStep?'done':''}"><div class="step-num">${i+1}</div>${s}</li>`).join('')}
function renderStep(){renderProgress();const holder=document.getElementById('steps-holder');const sections=[
`<div class="section-panel active"><div class="section-header"><h2>Applicant Details</h2></div><div class="card"><div class="grid-2"><div class="field"><label>Email Address <span class="req">*</span></label><input type="email" value="${form.email}"></div><div class="field"><label>Your Name <span class="req">*</span></label><input type="text" value="${form.name}"></div></div><div class="field"><label>Division <span class="req">*</span></label><input type="text" value="${form.division}"></div><div class="field"><label>Type of Code <span class="req">*</span></label><div class="radio-group"><div class="radio-opt selected">New Stockiest Code</div><div class="radio-opt">Extension Code</div></div></div></div><div class="nav-bar"><div></div><button class="btn btn-primary" onclick="nextStep()">Next →</button></div></div>`,
`<div class="section-panel active"><div class="section-header"><h2>Stockist Information</h2></div><div class="card"><div class="grid-2"><div class="field"><label>Stockist Name</label><input type="text" value="${form.stockistName}"></div><div class="field"><label>Stockist Place</label><input type="text" value="${form.stockistPlace}"></div></div><div class="grid-2"><div class="field"><label>HQ</label><input type="text" value="${form.hq}"></div><div class="field"><label>Uses Pharma Rack?</label><div class="radio-group"><div class="radio-opt selected">Yes</div><div class="radio-opt">No</div></div></div></div><div class="field"><label>Remarks</label><textarea>${form.remarks}</textarea></div></div><div class="nav-bar"><button class="btn btn-secondary" onclick="prevStep()">← Back</button><button class="btn btn-primary" onclick="nextStep()">Next →</button></div></div>`,
`<div class="section-panel active"><div class="section-header"><h2>KYC Documents</h2></div><div class="info-box">Upload placeholders</div><div class="card"><div class="grid-2">${['Drug License','GSTIN','PAN Card','Food Licence','Aadhar Card','Stockist Profile','Party Request Letter'].map(x=>docBox(x)).join('')}</div></div><div class="nav-bar"><button class="btn btn-secondary" onclick="prevStep()">← Back</button><button class="btn btn-primary" onclick="nextStep()">Next →</button></div></div>`,
`<div class="section-panel active"><div class="section-header"><h2>Financial Documents</h2></div><div class="card"><div class="grid-2">${['Bank Statement','TDS Declaration','Pharma Rack Consent','Warehouse Photos'].map(x=>docBox(x)).join('')}</div></div><div class="nav-bar"><button class="btn btn-secondary" onclick="prevStep()">← Back</button><button class="btn btn-primary" onclick="nextStep()">Next →</button></div></div>`,
`<div class="section-panel active"><div class="section-header"><h2>HQ Statements</h2></div><div class="card"><div class="grid-2">${['HQ Statement 1','HQ Statement 2'].map(x=>docBox(x)).join('')}</div></div><div class="nav-bar"><button class="btn btn-secondary" onclick="prevStep()">← Back</button><button class="btn btn-primary" onclick="nextStep()">Next →</button></div></div>`,
`<div class="section-panel active"><div class="section-header"><h2>Code Type Details</h2></div><div class="card"><div class="field"><label>Replacement Stockist Name & HQ</label><textarea></textarea></div><div class="field"><label>Reason For Replacement</label><textarea></textarea></div><div class="field"><label>Limit Reduction Stockist</label><div class="radio-group"><div class="radio-opt selected">MIS can select</div><div class="radio-opt">I will share name & limit</div></div></div></div><div class="nav-bar"><button class="btn btn-secondary" onclick="prevStep()">← Back</button><button class="btn btn-primary" onclick="nextStep()">Next →</button></div></div>`,
`<div class="section-panel active"><div class="section-header"><h2>Review & Submit</h2></div><div class="info-box">Ready to submit</div><div class="nav-bar"><button class="btn btn-secondary" onclick="prevStep()">← Back</button><button class="btn btn-submit" onclick="submitMain()">Submit Request</button></div></div>`
]; holder.innerHTML=sections[currentStep];}
function docBox(name){return `<div class="field"><label>${name}</label><div class="file-upload-area has-file"><div class="upload-icon">📄</div><div class="upload-label">Upload</div><div class="file-name">${name.toLowerCase().replace(/\s+/g,'-')}.pdf</div></div></div>`}
function nextStep(){if(currentStep<6){currentStep++;renderStep()}} function prevStep(){if(currentStep>0){currentStep--;renderStep()}}
function submitMain(){const id='REQ-'+String(Date.now()).slice(-6)+'-DEM';db.requests.unshift({id,name:form.stockistName,division:form.division,status:'Submitted',email:form.email});['Drug License','GSTIN','PAN Card','Food Licence','Bank Statement','HQ Statement 1'].forEach(d=>db.docs.unshift({req:id,doc:d,type:'Original',file:d.toLowerCase().replace(/\s+/g,'-')+'.pdf'}));document.getElementById('steps-holder').classList.add('hidden');document.getElementById('success-panel').classList.remove('hidden');document.getElementById('req-id-display').innerText=id;renderTables();renderAdminList()}
function openAdmin(){document.getElementById('admin-modal').classList.add('active')} function closeAdminModal(){document.getElementById('admin-modal').classList.remove('active')}
function validateAdmin(){if(document.getElementById('admin-pwd').value!=='STKREQ@2026') return; closeAdminModal(); document.getElementById('main-app').classList.add('hidden');document.getElementById('records-app').classList.add('hidden');document.getElementById('resubmit-app').classList.add('hidden');document.getElementById('admin-app').classList.remove('hidden');document.getElementById('btn-admin-login').classList.add('hidden');document.getElementById('btn-back-form').classList.remove('hidden');renderAdminList()}
function closeAdmin(){document.getElementById('admin-app').classList.add('hidden');document.getElementById('resubmit-app').classList.add('hidden');document.getElementById('records-app').classList.add('hidden');document.getElementById('main-app').classList.remove('hidden');document.getElementById('btn-back-form').classList.add('hidden');document.getElementById('btn-admin-login').classList.remove('hidden')}
function renderAdminList(){document.getElementById('admin-req-select').innerHTML=db.requests.map(r=>`<option value="${r.id}">${r.id} | ${r.name} (${r.division})</option>`).join('');document.getElementById('admin-doc-list').innerHTML=DOC_LIST.map(d=>`<label class="radio-opt" style="font-size:13px"><input type="checkbox" onchange="pickDoc('${d}',this.checked)"> ${d}</label>`).join('')}
function pickDoc(d,v){if(v) selectedDocs[d]=1; else delete selectedDocs[d]}
function sendResubmission(){const req=document.getElementById('admin-req-select').value;const docs=Object.keys(selectedDocs);const remarks=document.getElementById('admin-remarks').value.trim();if(!req||!docs.length||!remarks) return; const token='RESUB-'+String(Date.now()).slice(-6);const email=db.requests.find(x=>x.id===req)?.email||'';db.resub.unshift({req,token,email,docs,remarks,status:'Pending'});selectedDocs={};document.getElementById('admin-app').classList.add('hidden');document.getElementById('resubmit-app').classList.remove('hidden');renderResubmission();renderTables()}
function renderResubmission(){document.getElementById('resubmit-token').innerHTML=db.resub.filter(x=>x.status==='Pending').map(r=>`<option value="${r.token}">${r.token} | ${r.req}</option>`).join('')||'<option>No pending token</option>';loadResubmission()}
function loadResubmission(){const token=document.getElementById('resubmit-token').value;const row=db.resub.find(r=>r.token===token&&r.status==='Pending');if(!row){document.getElementById('resubmit-remarks').innerText='-';document.getElementById('resubmit-fields').innerHTML='';return} document.getElementById('resubmit-remarks').innerText=row.remarks;document.getElementById('resubmit-fields').innerHTML=row.docs.map(d=>`<div class="field"><label>${d}</label><div class="file-upload-area has-file"><div class="upload-icon">📄</div><div class="upload-label">Upload</div><div class="file-name">resubmit-${d.toLowerCase().replace(/\s+/g,'-')}.pdf</div></div></div>`).join('')}
function submitResubmission(){const token=document.getElementById('resubmit-token').value;const row=db.resub.find(r=>r.token===token&&r.status==='Pending');if(!row) return; row.status='Completed';row.docs.forEach(d=>db.docs.unshift({req:row.req,doc:d,type:'Resubmission',file:'resubmit-'+d.toLowerCase().replace(/\s+/g,'-')+'.pdf'}));document.getElementById('resubmit-app').classList.add('hidden');document.getElementById('records-app').classList.remove('hidden');renderTables()}
function renderTables(){document.getElementById('requests-table').innerHTML=`<thead><tr><th>Request ID</th><th>Stockist</th><th>Division</th><th>Status</th></tr></thead><tbody>${db.requests.map(r=>`<tr><td>${r.id}</td><td>${r.name}</td><td>${r.division}</td><td><span class="badge submitted">${r.status}</span></td></tr>`).join('')}</tbody>`;document.getElementById('docs-table').innerHTML=`<thead><tr><th>Request</th><th>Document</th><th>Version</th><th>File</th></tr></thead><tbody>${db.docs.map(d=>`<tr><td>${d.req}</td><td>${d.doc}</td><td>${d.type}</td><td>${d.file}</td></tr>`).join('')}</tbody>`;document.getElementById('resub-table').innerHTML=`<thead><tr><th>Request</th><th>Token</th><th>Docs</th><th>Status</th></tr></thead><tbody>${db.resub.length?db.resub.map(r=>`<tr><td>${r.req}</td><td>${r.token}</td><td>${r.docs.join(', ')}</td><td><span class="badge ${r.status==='Pending'?'pending':'completed'}">${r.status}</span></td></tr>`).join(''):'<tr><td colspan="4">No rows</td></tr>'}</tbody>`}
renderStep();renderTables();
</script>
</body>
</html>
